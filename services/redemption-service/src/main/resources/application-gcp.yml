# GCP profile - Cloud Run + Cloud SQL connection, Kafka disabled
# HikariCP pool capped at 2: db-f1-micro has max_connections=25;
# 6 services x 2 = 12 + BFF + reserved slots fits within the limit.
spring:
  datasource:
    url: jdbc:postgresql:///connected_commerce?cloudSqlInstance=gen-lang-client-0315293206:us-central1:cc-postgres&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
  kafka:
    bootstrap-servers: localhost:9092
