server:
  port: 8084

spring:
  application:
    name: redemption-service

  datasource:
    url: jdbc:postgresql://localhost:5432/connected_commerce
    username: commerce
    password: commerce_dev

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: redemptions
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: redemptions
    default-schema: redemptions

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.lbg.commerce: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{correlationId:-none}] %-5level %logger{36} - %msg%n"
