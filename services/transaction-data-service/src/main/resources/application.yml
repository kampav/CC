server:
  port: 8086

spring:
  application:
    name: transaction-data-service

  datasource:
    url: jdbc:postgresql://localhost:5432/connected_commerce
    username: commerce
    password: commerce_dev
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: banking_transactions
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: banking_transactions
    default-schema: banking_transactions

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: transaction-data-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.cc.transaction.kafka"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.cc.transaction.kafka.BankingTransactionEvent

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api/v1/transaction-data-service/api-docs
  swagger-ui:
    path: /api/v1/transaction-data-service/swagger-ui

logging:
  level:
    com.cc.transaction: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{correlationId:-none}] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: gcp
  datasource:
    url: ${CLOUD_SQL_URL}
    username: ${DB_USER:commerce}
    password: ${DB_PASSWORD}
  kafka:
    bootstrap-servers: ${PUBSUB_ENDPOINT:localhost:9092}
