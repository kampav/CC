apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cc-bff
  annotations:
    run.googleapis.com/ingress: all  # BFF is publicly accessible
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "100"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      containers:
        - image: gcr.io/PROJECT_ID/cc-bff:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cc-db-url
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cc-jwt-secret
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cc-redis-url
                  key: latest
            - name: OFFER_SERVICE_URL
              value: http://cc-offer-service
            - name: PARTNER_SERVICE_URL
              value: http://cc-partner-service
            - name: ELIGIBILITY_SERVICE_URL
              value: http://cc-eligibility-service
            - name: REDEMPTION_SERVICE_URL
              value: http://cc-redemption-service
            - name: CUSTOMER_SERVICE_URL
              value: http://cc-customer-data-service
            - name: TRANSACTION_SERVICE_URL
              value: http://cc-transaction-data-service
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
